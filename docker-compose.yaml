services:
  auth-profile-redis:
    image: redis
    container_name: auth-profile-redis
    ports:
      - "6379:6379"

  auth-profile-pg:
    image: postgres
    container_name: auth-profile-pg
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql
  
volumes:
  pg_data:


